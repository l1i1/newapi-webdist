name: Sync Upstream Frontend Release

on:
  # ── 自动：每小时检查上游是否有新 Release ──
  schedule:
    - cron: '0 * * * *'
  # ── 手动：可指定上游版本号 ──
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: '上游 QuantumNous/new-api 的版本号（留空则自动取最新 Release）'
        required: false
        default: ''

permissions:
  contents: write

# 防止多个 run 同时部署导致冲突
concurrency:
  group: deploy-dist
  cancel-in-progress: false

jobs:
  sync:
    name: Sync → dist
    runs-on: ubuntu-latest
    steps:
      # ─── Step 1: 获取上游最新 Release 版本号 ───
      - name: Fetch latest upstream release tag
        id: upstream
        env:
          INPUT_UPSTREAM_TAG: ${{ github.event.inputs.upstream_tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$INPUT_UPSTREAM_TAG" ]; then
            TAG="$(printf '%s' "$INPUT_UPSTREAM_TAG" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            MANUAL_TAG=true
          else
            TAG=$(curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/QuantumNous/new-api/releases/latest | jq -er '.tag_name')
            MANUAL_TAG=false
          fi

          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "::error::Failed to resolve latest upstream release tag"
            exit 1
          fi

          if ! [[ "$TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "::error::Invalid upstream tag for Docker image tag: $TAG"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "manual_tag=$MANUAL_TAG" >> "$GITHUB_OUTPUT"
          echo "→ Upstream latest: $TAG"

      # ─── Step 2: 确认官方 Docker 镜像 tag 已发布 ───
      - name: Check official Docker image tag
        id: docker_image
        env:
          UPSTREAM_TAG: ${{ steps.upstream.outputs.tag }}
          MANUAL_TAG: ${{ steps.upstream.outputs.manual_tag }}
        run: |
          IMAGE="calciumion/new-api:$UPSTREAM_TAG"

          if docker manifest inspect "$IMAGE" >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "→ Official Docker image is available: $IMAGE"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            if [ "$MANUAL_TAG" = "true" ]; then
              echo "::error::Official Docker image is not available for requested tag: $IMAGE"
              exit 1
            else
              echo "::warning::Official Docker image is not available yet: $IMAGE"
            fi
          fi

      # ─── Step 3: 读取 dist 分支中已部署的版本号 ───
      - name: Read deployed version from dist branch
        id: deployed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESP=$(curl -sS --retry 5 --retry-delay 2 --retry-all-errors -w "\n%{http_code}" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/contents/.deployed-version?ref=dist")
          HTTP_CODE=$(echo "$RESP" | tail -1)

          if [ "$HTTP_CODE" = "200" ]; then
            DEPLOYED=$(echo "$RESP" | sed '$d' | jq -r '.content' | base64 -d | tr -d '\r\n')
          else
            DEPLOYED=""
          fi
          echo "deployed=$DEPLOYED" >> "$GITHUB_OUTPUT"
          echo "→ Currently deployed: ${DEPLOYED:-none}"

      # ─── Step 4: 判断是否需要编译部署 ───
      - name: Decide whether to build
        id: check
        env:
          UPSTREAM_TAG: ${{ steps.upstream.outputs.tag }}
          DEPLOYED_VERSION: ${{ steps.deployed.outputs.deployed }}
          IMAGE_AVAILABLE: ${{ steps.docker_image.outputs.available }}
        run: |
          TARGET="${UPSTREAM_TAG}+docker-builder-verified-all"

          if [ "$IMAGE_AVAILABLE" != "true" ]; then
            echo "→ Official Docker image for $UPSTREAM_TAG is not available yet — skipping until next run"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          elif [ "$TARGET" = "$DEPLOYED_VERSION" ]; then
            echo "→ Already up to date — skipping"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "→ New Docker builder release: $TARGET (was ${DEPLOYED_VERSION:-none})"
            echo "should_build=true"  >> "$GITHUB_OUTPUT"
          fi

      # ─── Step 5: 检出上游源代码（指定版本 tag） ───
      - name: Checkout upstream source
        if: steps.check.outputs.should_build == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: QuantumNous/new-api
          ref: ${{ steps.upstream.outputs.tag }}
          path: upstream
          fetch-depth: 0

      # 校验：确认检出的 commit 与目标 tag 一致
      - name: Verify checked-out version
        if: steps.check.outputs.should_build == 'true'
        env:
          EXPECTED_TAG: ${{ steps.upstream.outputs.tag }}
        run: |
          cd upstream
          ACTUAL_TAG=$(git describe --tags --exact-match 2>/dev/null || echo "detached")
          ACTUAL_SHA=$(git rev-parse --short HEAD)
          echo "→ Expected tag : $EXPECTED_TAG"
          echo "→ Actual tag   : $ACTUAL_TAG"
          echo "→ Commit SHA   : $ACTUAL_SHA"
          if [ "$ACTUAL_TAG" != "$EXPECTED_TAG" ]; then
            echo "::error::Tag mismatch! Expected $EXPECTED_TAG but checked out $ACTUAL_TAG ($ACTUAL_SHA)"
            exit 1
          else
            echo "✅ Tag matches — building from $ACTUAL_TAG ($ACTUAL_SHA)"
          fi

      # ─── Step 6: 使用官方 Dockerfile 的 builder 阶段构建 web/default ───
      - name: Build frontend with upstream Docker builder
        if: steps.check.outputs.should_build == 'true'
        env:
          VERSION: ${{ steps.upstream.outputs.tag }}
        run: |
          echo "→ Building frontend from official Docker builder stage: $VERSION"
          echo "$VERSION" > upstream/VERSION
          docker build --target builder -t new-api-frontend-builder -f upstream/Dockerfile upstream
          CONTAINER_ID="$(docker create --entrypoint sh new-api-frontend-builder -c true)"
          trap 'docker rm -f "$CONTAINER_ID" >/dev/null 2>&1 || true' EXIT
          mkdir -p "$GITHUB_WORKSPACE/docker-builder-output"
          docker cp "$CONTAINER_ID:/build/dist/." "$GITHUB_WORKSPACE/docker-builder-output/"
          test -f "$GITHUB_WORKSPACE/docker-builder-output/index.html"

      # ─── Step 7: 校验官方 Docker 镜像可服务同名静态资源 ───
      - name: Verify against official Docker image
        if: steps.check.outputs.should_build == 'true'
        env:
          VERSION: ${{ steps.upstream.outputs.tag }}
        run: |
          set -e

          IMAGE="calciumion/new-api:$VERSION"
          echo "→ Verifying frontend index against $IMAGE"

          docker pull "$IMAGE"
          CONTAINER_ID="$(docker run -d -p 3000:3000 "$IMAGE")"
          trap 'docker rm -f "$CONTAINER_ID" >/dev/null 2>&1 || true' EXIT

          find docker-builder-output/static -type f \
            | sed 's#^docker-builder-output##' \
            | sort > builder-static-refs.txt

          FIRST_REF="$(head -n 1 builder-static-refs.txt)"
          if [ -z "$FIRST_REF" ]; then
            echo "::error::Docker builder output contains no static files"
            exit 1
          fi

          fetch_asset() {
            local asset="$1"
            local url="http://127.0.0.1:3000$asset"
            local code
            local attempt
            local delay

            for attempt in {1..8}; do
              code="$(curl -sS --head -o /dev/null -w '%{http_code}' \
                --connect-timeout 5 \
                --max-time 30 \
                "$url" || true)"

              if [ "$code" = "405" ]; then
                code="$(curl -sS -o /dev/null -w '%{http_code}' \
                  --connect-timeout 5 \
                  --max-time 30 \
                  "$url" || true)"
              fi

              if [ "$code" = "200" ]; then
                return 0
              fi

              if [ "$attempt" -eq 8 ]; then
                echo "::error::Official Docker image does not serve $asset after $attempt attempts (last HTTP status: ${code:-curl-failed})"
                return 1
              fi

              if [ "$code" = "429" ]; then
                delay=$((attempt * 15))
              else
                delay=$((attempt * 2))
              fi
              echo "→ Transient HTTP status ${code:-curl-failed} for $asset (attempt $attempt/8); retrying in ${delay}s"
              sleep "$delay"
            done
          }

          fetch_asset "$FIRST_REF"

          while IFS= read -r asset; do
            fetch_asset "$asset"
            sleep 1.2
          done < builder-static-refs.txt

      # ─── Step 8: 增量部署到 dist 分支 ───
      # 策略：克隆 dist 分支（不存在则创建），将构建产物覆写到克隆目录。
      # Rsbuild 的内容哈希文件名（index-SxSn0p90.js）自然实现"多版本 hash 产物并存"；
      # 同名文件（index.html 等）覆盖更新。rsync 不加 --delete，旧哈希文件保留。
      - name: Deploy to dist branch
        if: steps.check.outputs.should_build == 'true'
        env:
          TARGET_BRANCH: dist
          VERSION: ${{ steps.upstream.outputs.tag }}
        run: |
          set -e

          echo "::group::Configure git"
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          echo "::endgroup::"

          echo "::group::Prepare deploy worktree"
          # GITHUB_TOKEN 嵌 URL — GitHub Actions 自动 mask，set -e 无 verbose 不会泄露
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          DEPLOY_DIR="$(mktemp -d)"

          if git ls-remote --heads "$REPO_URL" "$TARGET_BRANCH" | grep -q .; then
            echo "→ Branch '$TARGET_BRANCH' exists — cloning with existing history"
            git clone --depth 1 --branch "$TARGET_BRANCH" "$REPO_URL" "$DEPLOY_DIR"
          else
            echo "→ Branch '$TARGET_BRANCH' does not exist — creating orphan"
            git clone --depth 1 "$REPO_URL" "$DEPLOY_DIR"
            git -C "$DEPLOY_DIR" checkout --orphan "$TARGET_BRANCH"
            git -C "$DEPLOY_DIR" rm -rf . 2>/dev/null || true
          fi
          echo "::endgroup::"

          echo "::group::Copy build output"
          # 不加 --delete：同名覆盖 + 新增哈希文件，旧哈希文件保留
          rsync -a docker-builder-output/ "$DEPLOY_DIR/"
          # 写入版本标记文件（用于下次 diff 比较）
          echo "$VERSION+docker-builder-verified-all" > "$DEPLOY_DIR/.deployed-version"
          echo "::endgroup::"

          echo "::group::Commit & push"
          cd "$DEPLOY_DIR"

          git add -A

          if git diff --staged --quiet; then
            echo "No changes — deploy branch already up to date"
          else
            git commit -m "deploy: $VERSION [skip ci]"
            git push origin "$TARGET_BRANCH"
            echo "✅ Deployed $VERSION → ${{ github.repository }}@$TARGET_BRANCH"
          fi
          echo "::endgroup::"
