name: Sync Upstream Frontend Release

on:
  # ── 自动：每小时检查上游是否有新 Release ──
  schedule:
    - cron: '0 * * * *'
  # ── 手动：可指定上游版本号 ──
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: '上游 QuantumNous/new-api 的版本号（留空则自动取最新 Release）'
        required: false
        default: ''

permissions:
  contents: write

# 防止多个 run 同时部署导致冲突
concurrency:
  group: deploy-dist
  cancel-in-progress: false

jobs:
  sync:
    name: Sync → dist
    runs-on: ubuntu-latest
    steps:
      # ─── Step 1: 获取上游最新 Release 版本号 ───
      - name: Fetch latest upstream release tag
        id: upstream
        env:
          INPUT_UPSTREAM_TAG: ${{ github.event.inputs.upstream_tag }}
        run: |
          if [ -n "$INPUT_UPSTREAM_TAG" ]; then
            TAG="$INPUT_UPSTREAM_TAG"
          else
            TAG=$(curl -fsSL https://api.github.com/repos/QuantumNous/new-api/releases/latest | jq -er '.tag_name')
          fi

          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "::error::Failed to resolve latest upstream release tag"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "→ Upstream latest: $TAG"

      # ─── Step 2: 读取 dist 分支中已部署的版本号 ───
      - name: Read deployed version from dist branch
        id: deployed
        run: |
          RESP=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/contents/.deployed-version?ref=dist")
          HTTP_CODE=$(echo "$RESP" | tail -1)

          if [ "$HTTP_CODE" = "200" ]; then
            DEPLOYED=$(echo "$RESP" | sed '$d' | jq -r '.content' | base64 -d | tr -d '\n')
          else
            DEPLOYED=""
          fi
          echo "deployed=$DEPLOYED" >> "$GITHUB_OUTPUT"
          echo "→ Currently deployed: ${DEPLOYED:-none}"

      # ─── Step 3: 判断是否需要编译部署 ───
      - name: Decide whether to build
        id: check
        run: |
          UPSTREAM="${{ steps.upstream.outputs.tag }}"
          DEPLOYED="${{ steps.deployed.outputs.deployed }}"

          if [ "$UPSTREAM" = "$DEPLOYED" ]; then
            echo "→ Already up to date — skipping"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "→ New release: $UPSTREAM (was $DEPLOYED)"
            echo "should_build=true"  >> "$GITHUB_OUTPUT"
          fi

      # ─── Step 4: 检出上游源代码（指定版本 tag） ───
      - name: Checkout upstream source
        if: steps.check.outputs.should_build == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: QuantumNous/new-api
          ref: ${{ steps.upstream.outputs.tag }}
          path: upstream
          fetch-depth: 0

      # 校验：确认检出的 commit 与目标 tag 一致
      - name: Verify checked-out version
        if: steps.check.outputs.should_build == 'true'
        run: |
          cd upstream
          EXPECTED_TAG="${{ steps.upstream.outputs.tag }}"
          ACTUAL_TAG=$(git describe --tags --exact-match 2>/dev/null || echo "detached")
          ACTUAL_SHA=$(git rev-parse --short HEAD)
          echo "→ Expected tag : $EXPECTED_TAG"
          echo "→ Actual tag   : $ACTUAL_TAG"
          echo "→ Commit SHA   : $ACTUAL_SHA"
          if [ "$ACTUAL_TAG" != "$EXPECTED_TAG" ]; then
            echo "::warning::Tag mismatch! Expected $EXPECTED_TAG but checked out $ACTUAL_TAG ($ACTUAL_SHA)"
          else
            echo "✅ Tag matches — building from $ACTUAL_TAG ($ACTUAL_SHA)"
          fi

      # ─── Step 5: 安装 Bun ───
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        if: steps.check.outputs.should_build == 'true'
        with:
          bun-version: latest

      # ─── Step 6: 缓存 ───
      # ⚠️ hashFiles 依赖 Step 4 checkout 已完成（由 should_build if 保证）
      # 缓存 Bun 全局包仓库（避免重复下载 tarball）
      - name: Cache Bun global store
        if: steps.check.outputs.should_build == 'true'
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('upstream/web/default/bun.lock') }}
          restore-keys: bun-cache-${{ runner.os }}-

      # 缓存 node_modules（避免重复 bun install）
      - name: Cache node_modules
        if: steps.check.outputs.should_build == 'true'
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4
        with:
          path: upstream/web/default/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('upstream/web/default/bun.lock') }}
          restore-keys: node-modules-${{ runner.os }}-

      # ─── Step 7: 编译 web/default ───
      - name: Build frontend (web/default)
        if: steps.check.outputs.should_build == 'true'
        env:
          CI: ''
          VERSION: ${{ steps.upstream.outputs.tag }}
        run: |
          echo "→ Building version: $VERSION"
          cd upstream/web/default
          bun install --frozen-lockfile
          DISABLE_ESLINT_PLUGIN='true' VITE_REACT_APP_VERSION=$VERSION bun run build
          cd "$GITHUB_WORKSPACE"

      # ─── Step 8: 增量部署到 dist 分支 ───
      # 策略：克隆 dist 分支（不存在则创建），将构建产物覆写到克隆目录。
      # Rsbuild 的内容哈希文件名（index-SxSn0p90.js）自然实现"多版本 hash 产物并存"；
      # 同名文件（index.html 等）覆盖更新。rsync 不加 --delete，旧哈希文件保留。
      - name: Deploy to dist branch
        if: steps.check.outputs.should_build == 'true'
        env:
          TARGET_BRANCH: dist
          VERSION: ${{ steps.upstream.outputs.tag }}
        run: |
          set -e

          echo "::group::Configure git"
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          echo "::endgroup::"

          echo "::group::Prepare deploy worktree"
          # GITHUB_TOKEN 嵌 URL — GitHub Actions 自动 mask，set -e 无 verbose 不会泄露
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          DEPLOY_DIR="$(mktemp -d)"

          if git ls-remote --heads "$REPO_URL" "$TARGET_BRANCH" | grep -q .; then
            echo "→ Branch '$TARGET_BRANCH' exists — cloning with existing history"
            git clone --depth 1 --branch "$TARGET_BRANCH" "$REPO_URL" "$DEPLOY_DIR"
          else
            echo "→ Branch '$TARGET_BRANCH' does not exist — creating orphan"
            git clone --depth 1 "$REPO_URL" "$DEPLOY_DIR"
            git -C "$DEPLOY_DIR" checkout --orphan "$TARGET_BRANCH"
            git -C "$DEPLOY_DIR" rm -rf . 2>/dev/null || true
          fi
          echo "::endgroup::"

          echo "::group::Copy build output"
          # 不加 --delete：同名覆盖 + 新增哈希文件，旧哈希文件保留
          rsync -a upstream/web/default/dist/ "$DEPLOY_DIR/"
          # 写入版本标记文件（用于下次 diff 比较）
          echo "$VERSION" > "$DEPLOY_DIR/.deployed-version"
          echo "::endgroup::"

          echo "::group::Commit & push"
          cd "$DEPLOY_DIR"

          git add -A

          if git diff --staged --quiet; then
            echo "No changes — deploy branch already up to date"
          else
            git commit -m "deploy: $VERSION [skip ci]"
            git push origin "$TARGET_BRANCH"
            echo "✅ Deployed $VERSION → ${{ github.repository }}@$TARGET_BRANCH"
          fi
          echo "::endgroup::"
