name: Sync Upstream Frontend Release

on:
  # ── 自动：每小时检查上游是否有新 Release ──
  schedule:
    - cron: '0 * * * *'
  # ── 手动：可指定上游版本号 ──
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: '上游 QuantumNous/new-api 的版本号（留空则自动取最新 Release）'
        required: false
        default: ''
      force:
        description: '强制重新部署（忽略版本检查，用于清理旧文件）'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

# 防止多个 run 同时部署导致冲突
concurrency:
  group: deploy-dist
  cancel-in-progress: false

jobs:
  sync:
    name: Sync → dist
    runs-on: ubuntu-latest
    steps:
      # ─── Step 1: 获取上游最新 Release 版本号 ───
      - name: Fetch latest upstream release tag
        id: upstream
        env:
          INPUT_UPSTREAM_TAG: ${{ github.event.inputs.upstream_tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$INPUT_UPSTREAM_TAG" ]; then
            TAG="$(printf '%s' "$INPUT_UPSTREAM_TAG" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
            MANUAL_TAG=true
          else
            TAG=$(curl -fsSL --retry 5 --retry-delay 2 --retry-all-errors \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/QuantumNous/new-api/releases/latest | jq -er '.tag_name')
            MANUAL_TAG=false
          fi

          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "::error::Failed to resolve latest upstream release tag"
            exit 1
          fi

          if ! [[ "$TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "::error::Invalid upstream tag for Docker image tag: $TAG"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "manual_tag=$MANUAL_TAG" >> "$GITHUB_OUTPUT"
          echo "→ Upstream latest: $TAG"

      # ─── Step 2: 确认官方 Docker 镜像 tag 已发布 ───
      - name: Check official Docker image tag
        id: docker_image
        env:
          UPSTREAM_TAG: ${{ steps.upstream.outputs.tag }}
          MANUAL_TAG: ${{ steps.upstream.outputs.manual_tag }}
        run: |
          IMAGE="calciumion/new-api:$UPSTREAM_TAG"

          if docker manifest inspect "$IMAGE" >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "→ Official Docker image is available: $IMAGE"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            if [ "$MANUAL_TAG" = "true" ]; then
              echo "::error::Official Docker image is not available for requested tag: $IMAGE"
              exit 1
            else
              echo "::warning::Official Docker image is not available yet: $IMAGE"
            fi
          fi

      # ─── Step 3: 读取 dist 分支中已部署的版本号 ───
      - name: Read deployed version from dist branch
        id: deployed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESP=$(curl -sS --retry 5 --retry-delay 2 --retry-all-errors -w "\n%{http_code}" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/contents/.deployed-version?ref=dist")
          HTTP_CODE=$(echo "$RESP" | tail -1)

          if [ "$HTTP_CODE" = "200" ]; then
            DEPLOYED=$(echo "$RESP" | sed '$d' | jq -r '.content' | base64 -d | tr -d '\r\n')
          else
            DEPLOYED=""
          fi
          echo "deployed=$DEPLOYED" >> "$GITHUB_OUTPUT"
          echo "→ Currently deployed: ${DEPLOYED:-none}"

      # ─── Step 4: 判断是否需要编译部署 ───
      - name: Decide whether to build
        id: check
        env:
          UPSTREAM_TAG: ${{ steps.upstream.outputs.tag }}
          DEPLOYED_VERSION: ${{ steps.deployed.outputs.deployed }}
          IMAGE_AVAILABLE: ${{ steps.docker_image.outputs.available }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          TARGET="${UPSTREAM_TAG}+http-extracted"

          if [ "$FORCE" = "true" ]; then
            echo "→ Force mode — redeploying regardless of version"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif [ "$IMAGE_AVAILABLE" != "true" ]; then
            echo "→ Official Docker image for $UPSTREAM_TAG is not available yet — skipping until next run"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          elif [ "$TARGET" = "$DEPLOYED_VERSION" ]; then
            echo "→ Already up to date — skipping"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "→ New Docker builder release: $TARGET (was ${DEPLOYED_VERSION:-none})"
            echo "should_build=true"  >> "$GITHUB_OUTPUT"
          fi

      # ─── Step 5: 通过 HTTP 从官方 Docker 镜像提取前端静态资源 ───
      - name: Extract frontend via HTTP from official Docker image
        if: steps.check.outputs.should_build == 'true'
        env:
          VERSION: ${{ steps.upstream.outputs.tag }}
        run: |
          set -e

          IMAGE="calciumion/new-api:$VERSION"
          echo "→ Extracting frontend via HTTP from: $IMAGE"
          echo "::group::Pull and start container"

          docker pull "$IMAGE"
          CONTAINER_ID="$(docker run -d -p 3100:3000 "$IMAGE")"
          trap 'docker rm -f "$CONTAINER_ID" >/dev/null 2>&1 || true' EXIT

          # 等待服务启动
          echo "Waiting for service to start..."
          for i in {1..30}; do
            if curl -sf http://localhost:3100/ >/dev/null 2>&1; then
              echo "✅ Service ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Service failed to start after 30 attempts"
              exit 1
            fi
            sleep 1
          done
          echo "::endgroup::"

          echo "::group::Parse and download resources"
          DIST_DIR="$GITHUB_WORKSPACE/docker-builder-output"
          mkdir -p "$DIST_DIR"

          # 1. 下载 index.html
          echo "Downloading index.html..."
          curl -sf http://localhost:3100/ -o "$DIST_DIR/index.html"

          # 2. 解析 HTML 中的资源引用
          echo "Parsing HTML resources..."
          grep -oE 'src="[^"]+"|href="[^"]+"' "$DIST_DIR/index.html" \
            | sed 's/src="//;s/href="//;s/"//' \
            | grep -v '^http' \
            | sort -u > /tmp/html-resources.txt

          # 3. 下载 HTML 引用的资源
          echo "Downloading HTML resources..."
          while IFS= read -r resource; do
            [ -z "$resource" ] && continue
            # 构建本地路径
            local_path="$DIST_DIR${resource}"
            mkdir -p "$(dirname "$local_path")"
            echo "  → $resource"
            curl -sf "http://localhost:3100${resource}" -o "$local_path"
          done < /tmp/html-resources.txt

          # 4. 解析 CSS 中的字体引用
          echo "Parsing CSS font resources..."
          find "$DIST_DIR" -name "*.css" -exec grep -oE "url\\(/static/font/[^)]+\\)" {} \; \
            | sed 's/url(//;s/)//;s/["'"'"']//g' \
            | sort -u > /tmp/font-resources.txt

          # 5. 下载字体资源
          echo "Downloading font resources..."
          while IFS= read -r font; do
            [ -z "$font" ] && continue
            local_path="$DIST_DIR${font}"
            mkdir -p "$(dirname "$local_path")"
            echo "  → $font"
            curl -sf "http://localhost:3100${font}" -o "$local_path"
          done < /tmp/font-resources.txt
          echo "::endgroup::"

          # 6. 验证
          echo "::group::Verification"
          html_count=$(wc -l < /tmp/html-resources.txt)
          font_count=$(wc -l < /tmp/font-resources.txt)
          total=$((html_count + font_count))
          echo "✅ Extracted: index.html + $html_count HTML resources + $font_count fonts = $total files"
          test -f "$DIST_DIR/index.html"
          echo "::endgroup::"

      # ─── Step 8: 增量部署到 dist 分支 ───
      # 策略：克隆 dist 分支（不存在则创建），将构建产物覆写到克隆目录。
      # Rsbuild 的内容哈希文件名（index-SxSn0p90.js）自然实现"多版本 hash 产物并存"；
      # 同名文件（index.html 等）覆盖更新。rsync 不加 --delete，旧哈希文件保留。
      - name: Deploy to dist branch
        if: steps.check.outputs.should_build == 'true'
        env:
          TARGET_BRANCH: dist
          VERSION: ${{ steps.upstream.outputs.tag }}
        run: |
          set -e

          echo "::group::Configure git"
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          echo "::endgroup::"

          echo "::group::Prepare deploy worktree"
          # GITHUB_TOKEN 嵌 URL — GitHub Actions 自动 mask，set -e 无 verbose 不会泄露
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          DEPLOY_DIR="$(mktemp -d)"

          if git ls-remote --heads "$REPO_URL" "$TARGET_BRANCH" | grep -q .; then
            echo "→ Branch '$TARGET_BRANCH' exists — cloning with existing history"
            git clone --depth 1 --branch "$TARGET_BRANCH" "$REPO_URL" "$DEPLOY_DIR"
          else
            echo "→ Branch '$TARGET_BRANCH' does not exist — creating orphan"
            git clone --depth 1 "$REPO_URL" "$DEPLOY_DIR"
            git -C "$DEPLOY_DIR" checkout --orphan "$TARGET_BRANCH"
            git -C "$DEPLOY_DIR" rm -rf . 2>/dev/null || true
          fi
          echo "::endgroup::"

          echo "::group::Copy build output"
          # --delete：删除旧版本哈希文件，避免 dist 分支无限膨胀
          rsync -a --delete docker-builder-output/ "$DEPLOY_DIR/"
          # 写入版本标记文件（用于下次 diff 比较）
          echo "$VERSION+http-extracted" > "$DEPLOY_DIR/.deployed-version"
          echo "::endgroup::"

          echo "::group::Commit & push"
          cd "$DEPLOY_DIR"

          git add -A

          if git diff --staged --quiet; then
            echo "No changes — deploy branch already up to date"
          else
            git commit -m "deploy: $VERSION [skip ci]"
            git push origin "$TARGET_BRANCH"
            echo "✅ Deployed $VERSION → ${{ github.repository }}@$TARGET_BRANCH"
          fi
          echo "::endgroup::"
